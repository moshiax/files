<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
	background-color: #0d1117;
	color: #c9d1d9;
	font-family: 'Courier New', Courier, monospace;
	display: flex;
	justify-content: center;
	align-items: center;
	margin: 0;
}

#app {
	text-align: center;
	width: 70%;
}
.file-item:hover {
    border-color: var(--hover-color);
    box-shadow: 0 0 1em var(--hover-color);
}
@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8);
    }
    50% {
        box-shadow: 0 0 15px 10px rgba(255, 0, 0, 0.6);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8);
    }
}

.modal-content.alert {
    animation: pulse 2s infinite;
    border-radius: 0.5em; 
}

#file-list {
	margin-top: 2em;
	display: flex;
	flex-wrap: wrap;
	justify-content: space-around;
}

.file-item {
	background-color: #161b22;
	border: 0.1em solid #30363d;
	border-radius: 0.375em;
	padding: 1em;
	margin: 1em;
	width: calc(50% - 2em);
	display: flex;
	align-items: center;
	justify-content: space-between;
	cursor: pointer;
	box-sizing: border-box;
}

.notification {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 20px;
  background-color: rgba(0,0,0,.8);
  color: #fff;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,.5);
  font-size: 1.5rem;
  text-align: center;
  z-index: 10000000;
  animation: fadeIn .5s ease-in-out,fadeOut .5s ease-in-out 1s
}

@media (max-width: 48em) {
	.file-item {
		width: calc(100% - 2em);
		flex-direction: column;
		align-items: flex-start;
	}

	.file-link {
		flex-grow: 1;
	}

	.button {
		margin-top: 1em;
		width: 100%;
		text-align: center;
	}
}

.file-item img {
	width: 3em;
	height: 3em;
	margin-right: 1em;
}

.file-link {
	display: flex;
	align-items: center;
	text-decoration: none;
	color: white;
	flex-grow: 1;
}

#confirm-download {
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 0.1875em;
    cursor: pointer;
    padding: 0.5em 1em;
    font-size: 0.875em;
    white-space: nowrap;
    transition: background-color 0.3s, opacity 0.3s;
}

#confirm-download:not([disabled]):hover {
    background-color: #218838; 
    opacity: 0.9;
}

#confirm-download:disabled {
    background-color: #555;
    cursor: not-allowed;
}

.hidden {
	display: none;
}

.expanded-content {
	margin-top: 1em;
	text-align: left;
	overflow: hidden;
	max-height: 0;
	transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
	opacity: 0;
}

.expanded-content.expanded {
	max-height: 30em;
	opacity: 1;
}

.expanded-content a {
	display: block;
	color: white;
	margin-bottom: 0.5em;
}

.modal {
	display: none;
	position: fixed;
	z-index: 1;
	left: 0;
	top: 0;
	width: 100%;
	height: 100%;
	overflow: auto;
	background-color: rgb(0, 0, 0);
	background-color: rgba(0, 0, 0, 0.8);
	justify-content: center;
	align-items: center;
}

.modal-content {
	background-color: #161b22;
	margin: auto;
	padding: 1em;
	border: 1px solid #30363d;
	width: 80%;
	max-width: 500px;
	text-align: center;
	color: #c9d1d9;
}

.modal-content h2 {
	color: #ff4d4d;
}

.modal-content input {
	margin-top: 1em;
	padding: 0.5em;
	width: 80%;
}

.modal-content button {
	background-color: #28a745;
	color: white;
	border: none;
	border-radius: 0.1875em;
	cursor: pointer;
	padding: 0.5em 1em;
	font-size: 0.875em;
	white-space: nowrap;
	margin-top: 1em;
	transition: background-color 0.3s;
}

.modal-content button:disabled {
	background-color: #555;
	cursor: not-allowed;
}

.button {
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 0.1875em;
    cursor: pointer;
    margin-left: 1em;
    padding: 0.5em 1em;
    font-size: 0.875em;
    white-space: nowrap;
    transition: background-color 0.3s, opacity 0.3s;
}

.button:hover {
    background-color: #218838;
    opacity: 0.9;
}

.button:focus {
    outline: none;
}

.button.pulse {
    animation: pulse 2s infinite;
}

#hosts-modal {
    display: none;
}

.modal.show, #hosts-modal.show {
    display: flex;
    animation: FadeIn 0.3s forwards;
}

.modal.hide, #hosts-modal.hide {
    animation: FadeOut 0.3s forwards;
}

@keyframes FadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes FadeOut {
  from {
    opacity: 1;
    transform: translateY(0);
  }
  to {
    opacity: 0;
    transform: translateY(20px);
  }
}

#hosts-modal .modal-content {
    background-color: #161b22;
    margin: auto;
    padding: 1em;
    border: 1px solid #30363d;
    width: 80%;
    max-width: 500px;
    text-align: center;
    color: #c9d1d9;
}

.modal-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 1em;
}

.modal-buttons button {
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 0.1875em;
    cursor: pointer;
    padding: 0.5em 1em;
    font-size: 0.875em;
    white-space: nowrap;
    transition: background-color 0.3s;
    flex: 1;
    margin: 0 0.5em;
}

.modal-buttons button:hover {
    background-color: #218838;
    opacity: 0.9;
}

.modal-buttons button:disabled {
    background-color: #555;
    cursor: not-allowed;
}


@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes fadeOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}


.notification.show {
    display: block;
    opacity: 1;
}

.notification.hidden {
    display: none;
}

.modal-container {
    display: none; 
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
}

.modal-container.show {
    display: flex;
}

.modal-container.hide {
    display: none;
}

.button-container {
    position: fixed;
    top: 0;
    right: 0;
    display: flex;
    border-radius: 0 0 0 50px;
    overflow: hidden;
    font-size: 20px;
}

.button-half {
    padding: 20px 30px;
    background-color: #1e232b;
    color: white;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s;
    outline: none;
    font-size: 20px;
}

.left-button {
    border-radius: 0 0 0 25px;
}

.right-button {
    border-radius: 0 0 25px;
}

.button-half:hover {
    background-color: #003C7D;
    opacity: 0.9;
}



    </style>
</head>
<body>
<div class="button-container">
    <button class="button-half left-button" onclick="goToExtensions()">Files</button>
    <button class="button-half right-button" onclick="goToLinks()">Extensions</button>
</div>
 
<script>
    function goToExtensions() {
        window.location.href = 'index.html';
    }

    function goToLinks() {
        window.location.href = 'extensions.html';
    }
</script>

    <div id="app">
        <div id="file-list"></div>
    </div>

    <script>
        const siteLinks = [
            { name: "Neiki", url: "https://tip.neiki.dev", icon: "sites-icons/Neiki.png" },
            { name: "Triage", url: "https://tria.ge", icon: "exe/triage.png" },
            { name: 'Smail', url: 'https://smailpro.com/temporary-email', icon: 'exe/smail.png' },
            { name: 'BeznogyCrypt', url: 'https://beznogycrypt.netlify.app', icon: 'exe/beznogycrypt.png' },
            { name: 'botToken Manager', url: 'https://moshiax.github.io/files/tokenmanager', icon: 'exe/tokenmanager.png' },			
            { name: 'botWebhook Manager', url: 'https://moshiax.github.io/files/discordmanager', icon: 'exe/kozlinyadiscord.png' },	
			{ name: "PyStatic", url: "https://staticanalyze.netlify.app/injector/viewer/static", icon: 'sites-icons/PyStatic.png' },
			{ name: "youtube666", url: "https://moshiax.github.io/youtube666/", icon: 'sites-icons/666.jpg' },
			{ name: "WebOTP", url: "https://moshiax.github.io/WebOTP", icon: 'https://moshiax.github.io/WebOTP/icon.png' },
			{ name: "Nyaa", url: "https://nyaa.si", icon: 'https://nyaa.si/static/favicon.png' },
			{ name: "Session", url: "https://getsession.org", icon: 'https://pbs.twimg.com/profile_images/1510100602197471233/PL-YIcwt_400x400.jpg' },
			{ name: "Lokinet", url: "https://lokinet.org", icon: 'https://pbs.twimg.com/profile_images/1384037340457234432/sWQtmZo4_400x400.png' },
        ];

        function getDominantColor(imageUrl, callback) {
            const colorThief = new ColorThief();
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                const dominantColors = colorThief.getPalette(img, 5);
                callback(dominantColors);
            };
            img.src = imageUrl;
        }

        function setIconColorAndHover(fileItem, iconElement, colors) {
            let colorIndex = 0;

            function applyColor() {
                const color = colors[colorIndex];
                if (!color) {
                    fileItem.style.setProperty('--hover-color', 'rgba(75, 0, 130, 0.5)');
                    return;
                }

                const [r, g, b] = color;
                if (r < 50 && g < 50 && b < 50) {
                    colorIndex++;
                    applyColor();
                } else {
                    iconElement.style.filter = `drop-shadow(0 0 5px rgba(${r}, ${g}, ${b}, 0.5))`;
                    fileItem.style.setProperty('--hover-color', `rgba(${r}, ${g}, ${b}, 0.5)`);
                }
            }

            applyColor();
        }

        function renderSites() {
            const fileListElement = document.getElementById("file-list");

            siteLinks.forEach(site => {
                const fileItem = document.createElement("div");
                fileItem.className = "file-item";

                fileItem.onclick = () => {
                    window.open(site.url, "_blank");
                };

                const fileIcon = document.createElement("img");
                fileIcon.src = site.icon;
                fileIcon.onload = () => {
                    getDominantColor(site.icon, (colors) => {
                        setIconColorAndHover(fileItem, fileIcon, colors);
                    });
                };

                const fileLink = document.createElement("span"); 
                fileLink.className = "file-link";
                fileLink.innerText = site.name;

                fileItem.appendChild(fileIcon);
                fileItem.appendChild(fileLink);
                fileListElement.appendChild(fileItem);
            });
        }

        renderSites();
    </script>
</body>
</html>
